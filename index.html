<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine?</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* General Page Styling */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe6e6; 
            font-family: 'Arial', sans-serif;
            overflow: hidden; 
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            position: relative; /* Acts as the boundary */
            min-height: 450px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .gif-container img {
            width: 100%;
            max-width: 200px;
            border-radius: 10px;
            margin-bottom: 20px;
            object-fit: cover;
        }

        h1 {
            color: #ff4d4d;
            font-size: 2.5rem;
            margin-bottom: 30px;
            z-index: 1; 
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            width: 100%;
            position: relative;
            min-height: 60px; 
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s ease;
            z-index: 10; 
        }

        #yesBtn {
            background-color: #ff4d4d;
            color: white;
            font-weight: bold;
        }

        #yesBtn:hover {
            background-color: #e60000;
            transform: scale(1.1);
        }

        #noBtn {
            background-color: #f0f0f0;
            color: #333;
            font-weight: bold;
            position: relative; 
            transition: top 0.3s ease, left 0.3s ease;
        }

        #success-message {
            display: none;
            z-index: 20;
        }

        #success-message h2 {
            color: #ff4d4d;
            font-size: 1.8rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div id="question-section">
            <div class="gif-container">
                <img src="./static/valentine.png" alt="Cute Valentine Image">
            </div>
            <h1>Will you be my Valentine?</h1>
            <div class="btn-container">
                <button id="yesBtn">Yes</button>
                <button id="noBtn">No</button>
            </div>
        </div>

        <div id="success-message">
            <img src="./static/success.png" alt="Celebration" style="width: 200px; border-radius: 10px;">
            <h2>Of course you would say yess! ❤️</h2>
            <h2>See you on 14th February owo</h2>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const questionSection = document.getElementById('question-section');
        const successMessage = document.getElementById('success-message');

        // Logic for "No" button escaping
        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', moveButton);

        function moveButton() {
            // We use PERCENTAGES now. This ensures it stays within the white box
            // regardless of the exact pixel size.
            
            // Generate a random number between 0 and 100 for Top and Left
            // We limit the range so it doesn't go too close to the edge.
            
            // Left: Random position between 5% and 65% (So it doesn't overflow right)
            const randomLeft = Math.floor(Math.random() * (65 - 5 + 1)) + 5;
            
            // Top: Random position between 5% and 85% (So it doesn't overflow bottom)
            const randomTop = Math.floor(Math.random() * (85 - 5 + 1)) + 5;

            noBtn.style.position = 'absolute';
            noBtn.style.left = `${randomLeft}%`;
            noBtn.style.top = `${randomTop}%`;
        }

        // Logic for "Yes" button + Confetti
        yesBtn.addEventListener('click', () => {
            questionSection.style.display = 'none';
            successMessage.style.display = 'block';
            triggerConfetti();
        });

        // Confetti Effect
        function triggerConfetti() {
            const duration = 3 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                const particleCount = 50 * (timeLeft / duration);
                
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }
    </script>
</body>
</html>
